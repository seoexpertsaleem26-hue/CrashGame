<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Game</title>
<style>
body{background:#0b0b0b;color:white;font-family:Arial;text-align:center;margin:0;}
header{background:#111;padding:15px;font-size:22px;font-weight:bold;color:#00ffc3;}
.container{padding:15px;}
input{padding:10px;margin:5px;width:90%;max-width:300px;border:none;border-radius:5px;}
button{padding:10px 20px;margin:5px;border:none;border-radius:5px;background:#00ffc3;font-weight:bold;cursor:pointer;}
button:hover{background:#00d1a0;}
#balance{font-size:20px;margin:10px;color:#00ffc3;}
#multiplier{font-size:40px;margin:10px;}
canvas{background:black;border-radius:10px;margin-top:10px;width:100%;}
#plane{position:absolute;width:50px;top:240px;left:30px;}
.card{background:#111;padding:15px;border-radius:10px;margin:10px auto;max-width:350px;}
#walletSection{display:none;}
#loginSection{display:none;}
</style>
</head>
<body>

<header>✈ Crash Game</header>
<div class="container">

<div id="signupSection" class="card">
<h2>Signup</h2>
<input id="signupFullName" placeholder="Full Name">
<input id="signupUsername" placeholder="Username">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<br>
<button id="signupBtn">Create Account</button>
<p>Already have account? <button id="gotoLoginBtn">Login</button></p>
</div>

<div id="loginSection" class="card">
<h2>Login</h2>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<br>
<button id="loginBtn">Login</button>
<p>New user? <button id="gotoSignupBtn">Signup</button></p>
</div>

<div id="walletSection">
<div id="balance">Balance: 0</div>
<div id="multiplier">1.00x</div>
<canvas id="graph" width="350" height="200"></canvas>
<img id="plane" src="https://i.imgur.com/7Qp9Z5V.png">

<div class="card">
<input id="bet" type="number" placeholder="Bet Amount">
<br>
<button id="startBtn">Start Bet</button>
<button id="cashoutBtn">Cashout</button>
<div id="result"></div>
</div>

<div class="card">
<h3>Deposit</h3>
<p>Send payment to</p>
<b>JazzCash / EasyPaisa</b>
<p style="font-size:18px;">03064411625</p>
<input id="depositAmount" type="number" placeholder="Amount">
<input id="depositTxn" placeholder="Transaction ID">
<button id="depositBtn">Submit Deposit</button>
</div>

<div class="card">
<h3>Withdraw</h3>
<input id="withdrawAmount" type="number" placeholder="Amount">
<input id="withdrawAccount" placeholder="JazzCash / Easypaisa Number">
<button id="withdrawBtn">Withdraw</button>
</div>

<div class="card">
<h3>Game History</h3>
<ul id="historyList"></ul>
</div>

<hr>
<h2>Admin Login</h2>
<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button id="adminLoginBtn">Login as Admin</button>

<div id="adminPanel" class="card" style="display:none;">
<h2>Admin Dashboard</h2>
<h4>All Users</h4>
<ul id="adminUsers"></ul>
<h4>Pending Deposits</h4>
<ul id="adminDeposits"></ul>
<h4>Pending Withdraws</h4>
<ul id="adminWithdraws"></ul>
</div>

<audio id="cashSound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="crashSound" src="https://freesound.org/data/previews/331/331912_3248244-lq.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
