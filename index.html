<!DOCTYPE html>
<html>

<head>

<title>Crash Game</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ffcc;
}

#multiplier{
font-size:60px;
margin:20px;
}

input{
padding:10px;
font-size:18px;
width:150px;
margin:10px;
}

button{
padding:10px 20px;
font-size:18px;
margin:10px;
cursor:pointer;
}

#balance{
font-size:22px;
color:#00ffcc;
margin:10px;
}

#result{
font-size:24px;
margin-top:20px;
}

#history{
margin-top:30px;
}

canvas{
background:#000;
border:1px solid #444;
margin-top:20px;
}

#loginBox{
margin-top:30px;
}

</style>

</head>

<body>

<h1>Crash Game</h1>

<div id="loginBox">

<h3>Enter Player Name</h3>

<input id="playerName" placeholder="Your Name">

<button onclick="login()">Start Game</button>

</div>

<div id="gameArea" style="display:none;">

<div id="balance">Balance: 1000</div>

<div id="multiplier">1.00x</div>

<canvas id="graph" width="400" height="200"></canvas>

<br>

<input type="number" id="bet" placeholder="Enter Bet Amount">

<br>

<button onclick="startGame()">Start Bet</button>

<button onclick="cashout()">Cashout</button>

<div id="result"></div>

<div id="history">

<h3>Game History</h3>

<ul id="historyList"></ul>

</div>

</div>

<script>

let player = localStorage.getItem("player")

function login(){

let name = document.getElementById("playerName").value

if(name==""){
alert("Enter your name")
return
}

localStorage.setItem("player",name)

location.reload()

}

if(player){

document.getElementById("loginBox").style.display="none"

document.getElementById("gameArea").style.display="block"

}

</script>

<script src="game.js"></script>

</body>

</html>
