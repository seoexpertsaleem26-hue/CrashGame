<!DOCTYPE html>
<html>
<head>
<title>Crash Game Platform</title>
<style>
body{background:#111;color:white;font-family:Arial;text-align:center;margin:0;padding:0;}
h1,h2{color:#00ffcc;}
input, button{padding:10px;font-size:16px;margin:5px;}
button{cursor:pointer;}
#gamePage,#walletPage,#adminPanel{display:none;}
#multiplier{font-size:50px;margin:20px;}
#balance{font-size:20px;color:#00ffcc;margin:10px;}
canvas{background:black;border:1px solid #444;margin-top:20px;}
#plane{position:absolute; left:50px; top:220px; width:60px; z-index:10;}
ul{list-style:none;padding:0;}
button.verify, button.approve{background:#0f0;color:#000;border:none;padding:5px 10px;margin-left:5px;cursor:pointer;}
button.verify:hover, button.approve:hover{background:#0c0;}
</style>
</head>
<body>

<!-- Signup/Login Page -->
<div id="loginPage">
<h1>Welcome to Crash Game</h1>
<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="userPass" placeholder="Enter Password">
<button id="signupBtn">Signup</button>
<button id="loginBtn">Login</button>
<div id="loginMsg"></div>
</div>

<!-- Wallet + Game Page -->
<div id="walletPage">
<h2>Wallet: <span id="balance">0</span></h2>

<h3>Deposit</h3>
<p>Send payment to JazzCash: 03064411625 | EasyPaisa: 03064411625</p>
<input type="number" id="depositAmount" placeholder="Amount">
<input type="text" id="depositTxn" placeholder="Transaction ID">
<button onclick="depositRequest()">Submit Deposit</button>

<h3>Withdraw</h3>
<input type="number" id="withdrawAmount" placeholder="Amount">
<input type="text" id="withdrawAccount" placeholder="Your JazzCash/EasyPaisa Number">
<button onclick="withdrawRequest()">Submit Withdraw</button>

<div id="gamePage">
<h1>Crash Game</h1>
<div id="multiplier">1.00x</div>
<canvas id="graph" width="400" height="200"></canvas>
<img id="plane" src="https://i.imgur.com/7Qp9Z5V.png">
<br>
<input id="bet" type="number" placeholder="Bet Amount">
<button id="startBtn">Start Bet</button>
<button id="cashoutBtn">Cashout</button>
<div id="result"></div>
<h3>History</h3>
<ul id="historyList"></ul>
</div>
</div>

<!-- Admin Panel -->
<div id="adminPanel">
<h2>Admin Dashboard</h2>
<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button id="adminLoginBtn">Login</button>
<div id="adminContent" style="display:none;">
<h3>All Users</h3>
<ul id="allUsersList"></ul>
<h3>Pending Deposits</h3>
<ul id="adminDeposits"></ul>
<h3>Pending Withdraws</h3>
<ul id="adminWithdraws"></ul>
</div>
</div>

<audio id="cashSound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="crashSound" src="https://freesound.org/data/previews/331/331912_3248244-lq.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
