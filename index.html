<!DOCTYPE html>
<html>
<head>
<title>Crash Game Platform</title>
<style>
body{background:#111; color:white; font-family:Arial; text-align:center;}
h1,h2{color:#00ffcc;}
#multiplier{font-size:50px;margin:20px;}
#balance{font-size:20px;color:#00ffcc;margin:10px;}
input, button{padding:10px;font-size:16px;margin:5px;}
button{cursor:pointer;}
canvas{background:black;border:1px solid #444;margin-top:20px;}
#plane{position:absolute; left:50px; top:220px; width:60px; z-index:10;}
#adminPanel{display:none; border:2px solid #00ffcc; padding:10px; margin-top:20px;}
button.verify, button.approve, button.addBal, button.resetBal{background:#0f0; color:#000; border:none; padding:5px 10px; margin-left:5px; cursor:pointer;}
button.verify:hover, button.approve:hover, button.addBal:hover, button.resetBal:hover{background:#0c0;}
#walletSection{display:none;}
#loginSection, #signupSection{margin-top:50px;}
</style>
</head>
<body>

<h1>Crash Game Platform</h1>

<!-- Signup -->
<div id="signupSection">
<h2>Signup</h2>
<input type="text" id="signupFullName" placeholder="Full Name"><br>
<input type="text" id="signupUsername" placeholder="Username"><br>
<input type="email" id="signupEmail" placeholder="Email"><br>
<input type="password" id="signupPassword" placeholder="Password"><br>
<button id="signupBtn">Signup</button>
</div>

<!-- Login -->
<div id="loginSection" style="display:none;">
<h2>Login</h2>
<input type="text" id="loginUsername" placeholder="Username"><br>
<input type="password" id="loginPassword" placeholder="Password"><br>
<button id="loginBtn">Login</button>
</div>

<!-- Wallet & Game -->
<div id="walletSection">
<div id="balance">Balance: 0</div>
<div id="multiplier">1.00x</div>
<canvas id="graph" width="400" height="200"></canvas>
<img id="plane" src="https://i.imgur.com/7Qp9Z5V.png">

<br>
<input id="bet" type="number" placeholder="Bet Amount">
<br>
<button id="startBtn">Start Bet</button>
<button id="cashoutBtn">Cashout</button>

<div id="result"></div>

<h3>Deposit</h3>
<p>Send payment to JazzCash: 03064411625 | EasyPaisa: 03064411625</p>
<input id="depositAmount" type="number" placeholder="Deposit Amount">
<input id="depositTxn" type="text" placeholder="Transaction ID">
<button id="depositBtn">Submit Deposit</button>

<h3>Withdraw</h3>
<input id="withdrawAmount" type="number" placeholder="Withdraw Amount">
<input id="withdrawAccount" type="text" placeholder="Your JazzCash/EasyPaisa Number">
<button id="withdrawBtn">Submit Withdraw</button>

<h3>History</h3>
<ul id="historyList"></ul>
</div>

<hr>
<!-- Admin Login -->
<h2>Admin Login</h2>
<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button id="adminLoginBtn">Login as Admin</button>

<!-- Admin Panel -->
<div id="adminPanel">
<h2>Admin Dashboard</h2>
<h4>All Users</h4>
<ul id="adminUsers"></ul>
<h4>Pending Deposits</h4>
<ul id="adminDeposits"></ul>
<h4>Pending Withdraws</h4>
<ul id="adminWithdraws"></ul>
</div>

<audio id="cashSound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="crashSound" src="https://freesound.org/data/previews/331/331912_3248244-lq.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
